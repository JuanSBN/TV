<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <!-- Viewport nativo para TV Full HD: esencial incluso en app alojada -->
    <meta name="viewport" content="width=1920, height=1080, user-scalable=no" />
    <title>Mi Xuper TV</title>
    <link rel="stylesheet" type="text/css" href="css/style.css" />
    <!-- Evita que el navegador TV active modo mouse/puntero -->
<meta name="viewport" content="width=1920, height=1080, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<style>
    /* Ocultar cursor y evitar scroll accidental */
    body, html { overflow: hidden; cursor: none; -webkit-user-select: none; }
    *:focus { outline: none; }
</style>
</head>
<body>
    <!-- Reproductor nativo: hardware-accelerated -->
    <video id="tv-player" 
           autoplay 
           style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; background:#000;">
    </video>

    <!-- UI flotante -->
    <div id="ui-sidebar" class="sidebar">
        <div class="sidebar-header">
            <span id="app-title">Mi Xuper TV</span>
            <span id="total-canales" class="badge">0</span>
        </div>
        
        <!-- Scroll virtualizado -->
        <div id="scroll-contenedor" class="scroll-box">
            <ul id="dom-lista"></ul>
        </div>
        
        <!-- Indicadores de estado: CRÍTICOS para app remota -->
        <div id="loading-indicator" class="loading" style="display:none;">Actualizando...</div>
        <div id="error-message" class="error" style="display:none;"></div>
    </div>

    <!-- API de Samsung (funciona igual en app local o alojada) -->
    <script type="text/javascript" src="$WEBAPIS/webapis/webapis.js"></script>
    
    <!-- Scripts de la aplicación -->
    <script src="js/remote.js"></script>
    <script src="js/parser.js"></script>
    <script src="js/virtualscroll.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
